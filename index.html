<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Starter</title>
  <style>
    :root {
      --bg-main: #071426;
      --bg-secondary: #0B1F3A;
      --gold: #C8A96A;
      --gold-soft: rgba(200, 169, 106, 0.14);
      --text: #F8FAFC;
      --muted: #C9D4E3;
      --card: rgba(255, 255, 255, 0.10);
      --card-border: rgba(255, 255, 255, 0.18);
      --glass: blur(18px);
      --danger: #ef4444;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --transition: 0.25s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200, 169, 106, 0.16), transparent 25%),
        radial-gradient(circle at right center, rgba(255, 255, 255, 0.06), transparent 18%),
        linear-gradient(180deg, var(--bg-main), var(--bg-secondary));
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }

    button, input {
      font: inherit;
    }

    .app {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
      padding: 24px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: var(--glass);
      box-shadow: var(--shadow);
    }

    .signature {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      align-self: flex-start;
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .branding h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .branding p {
      color: var(--muted);
      max-width: 720px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--gold);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(200, 169, 106, 0.8);
    }

    .task-form-wrap {
      margin-bottom: 28px;
      padding: 22px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: var(--glass);
      box-shadow: var(--shadow);
    }

    .task-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
    }

    .task-input {
      width: 100%;
      min-height: 56px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      padding: 0 20px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .task-input::placeholder {
      color: #b8c4d6;
    }

    .task-input:focus {
      border-color: rgba(200, 169, 106, 0.8);
      box-shadow: 0 0 0 5px var(--gold-soft);
      background: rgba(255,255,255,0.11);
    }

    .btn {
      min-height: 56px;
      border: none;
      border-radius: 999px;
      padding: 0 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #e1c28d);
      color: #111827;
      box-shadow: 0 16px 30px rgba(200, 169, 106, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 36px rgba(200, 169, 106, 0.34);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }

    .column {
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.08);
      backdrop-filter: var(--glass);
      box-shadow: var(--shadow);
      min-height: 480px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 18px 12px;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .column-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(200, 169, 106, 0.75);
    }

    .task-count {
      min-width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--muted);
      font-size: 0.92rem;
      padding: 0 10px;
    }

    .column-body {
      flex: 1;
      padding: 12px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 340px;
      transition: background var(--transition);
    }

    .column-body.drag-over {
      background: rgba(200, 169, 106, 0.08);
    }

    .task-card {
      position: relative;
      padding: 18px 18px 52px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
      cursor: grab;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
      user-select: none;
    }

    .task-card:hover {
      transform: translateY(-2px);
      border-color: rgba(200, 169, 106, 0.45);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
    }

    .task-card.dragging {
      opacity: 0.45;
      transform: rotate(1deg) scale(0.99);
      cursor: grabbing;
    }

    .task-text {
      font-size: 1rem;
      color: var(--text);
      word-break: break-word;
    }

    .task-meta {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .task-tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(200, 169, 106, 0.14);
      color: var(--gold);
      font-size: 0.82rem;
      border: 1px solid rgba(200, 169, 106, 0.18);
    }

    .delete-btn {
      border: none;
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition);
      font-size: 1rem;
      line-height: 1;
    }

    .delete-btn:hover {
      transform: scale(1.06);
      background: rgba(239, 68, 68, 0.2);
    }

    .empty-state {
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: var(--radius-lg);
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    @media (max-width: 980px) {
      .board {
        grid-template-columns: 1fr;
      }

      .column {
        min-height: 320px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .task-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="branding">
        <div class="badge">Kanban Starter</div>
        <h1>Organisez vos tâches visuellement.</h1>
        <p>Ajoutez des tâches, déplacez-les entre les colonnes et retrouvez-les automatiquement grâce à la sauvegarde locale dans votre navigateur.</p>
      </div>
      <div class="signature">By Raphael</div>
    </header>

    <section class="task-form-wrap">
      <form class="task-form" id="taskForm">
        <input id="taskInput" class="task-input" type="text" placeholder="Ajouter une nouvelle tâche..." maxlength="180" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Ajouter</button>
      </form>
    </section>

    <main class="board">
      <section class="column">
        <div class="column-header">
          <div class="column-title"><span class="column-dot"></span>To Do</div>
          <div class="task-count" id="count-todo">0</div>
        </div>
        <div class="column-body" data-dropzone="todo"></div>
      </section>

      <section class="column">
        <div class="column-header">
          <div class="column-title"><span class="column-dot"></span>In Progress</div>
          <div class="task-count" id="count-inprogress">0</div>
        </div>
        <div class="column-body" data-dropzone="inprogress"></div>
      </section>

      <section class="column">
        <div class="column-header">
          <div class="column-title"><span class="column-dot"></span>Done</div>
          <div class="task-count" id="count-done">0</div>
        </div>
        <div class="column-body" data-dropzone="done"></div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'kanban-vscode-starter';

    const defaultTasks = [
      { id: crypto.randomUUID(), text: 'Créer la structure du projet', status: 'todo' },
      { id: crypto.randomUUID(), text: 'Tester le drag and drop', status: 'inprogress' },
      { id: crypto.randomUUID(), text: 'Préparer la V2 avec Git et Netlify', status: 'done' }
    ];

    let tasks = loadTasks();
    let draggedTaskId = null;

    const taskForm = document.getElementById('taskForm');
    const taskInput = document.getElementById('taskInput');
    const dropzones = document.querySelectorAll('[data-dropzone]');

    taskForm.addEventListener('submit', function (event) {
      event.preventDefault();
      const value = taskInput.value.trim();

      if (!value) {
        taskInput.focus();
        return;
      }

      tasks.unshift({
        id: crypto.randomUUID(),
        text: value,
        status: 'todo'
      });

      saveTasks();
      renderBoard();
      taskForm.reset();
      taskInput.focus();
    });

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultTasks;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : defaultTasks;
      } catch (error) {
        console.error('Erreur localStorage', error);
        return defaultTasks;
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function deleteTask(taskId) {
      tasks = tasks.filter(task => task.id !== taskId);
      saveTasks();
      renderBoard();
    }

    function moveTask(taskId, newStatus) {
      tasks = tasks.map(task => task.id === taskId ? { ...task, status: newStatus } : task);
      saveTasks();
      renderBoard();
    }

    function statusLabel(status) {
      if (status === 'todo') return 'To Do';
      if (status === 'inprogress') return 'In Progress';
      return 'Done';
    }

    function createTaskCard(task) {
      const card = document.createElement('article');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.taskId = task.id;

      const text = document.createElement('div');
      text.className = 'task-text';
      text.textContent = task.text;

      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const tag = document.createElement('span');
      tag.className = 'task-tag';
      tag.textContent = statusLabel(task.status);

      const deleteButton = document.createElement('button');
      deleteButton.className = 'delete-btn';
      deleteButton.type = 'button';
      deleteButton.innerHTML = '&times;';
      deleteButton.addEventListener('click', function () {
        deleteTask(task.id);
      });

      meta.append(tag, deleteButton);
      card.append(text, meta);

      card.addEventListener('dragstart', function () {
        draggedTaskId = task.id;
        card.classList.add('dragging');
      });

      card.addEventListener('dragend', function () {
        draggedTaskId = null;
        card.classList.remove('dragging');
        clearDragState();
      });

      return card;
    }

    function renderBoard() {
      const statuses = ['todo', 'inprogress', 'done'];

      statuses.forEach(function (status) {
        const zone = document.querySelector(`[data-dropzone="${status}"]`);
        const count = document.getElementById(`count-${status}`);
        const filteredTasks = tasks.filter(task => task.status === status);

        zone.innerHTML = '';
        count.textContent = filteredTasks.length;

        if (filteredTasks.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.textContent = 'Aucune tâche ici pour le moment.';
          zone.appendChild(empty);
          return;
        }

        filteredTasks.forEach(function (task) {
          zone.appendChild(createTaskCard(task));
        });
      });
    }

    function clearDragState() {
      dropzones.forEach(zone => zone.classList.remove('drag-over'));
    }

    dropzones.forEach(function (zone) {
      zone.addEventListener('dragover', function (event) {
        event.preventDefault();
        zone.classList.add('drag-over');
      });

      zone.addEventListener('dragleave', function () {
        zone.classList.remove('drag-over');
      });

      zone.addEventListener('drop', function (event) {
        event.preventDefault();
        const newStatus = zone.dataset.dropzone;
        if (draggedTaskId) {
          moveTask(draggedTaskId, newStatus);
        }
        zone.classList.remove('drag-over');
      });
    });

    renderBoard();
  </script>
</body>
</html>
